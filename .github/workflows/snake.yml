name: Generate Contribution Snake

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/snake.yml
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#22C55E&color_dots=#ebedf0,#c6f6d5,#68d391,#22c55e,#15803d
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#22C55E&color_dots=#0d1117,#0e4429,#006d32,#26a641,#39d353

      - name: Publish snake SVG
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
