name: Generate Profile Widgets

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - scripts/generate_profile_widgets.py
      - .github/workflows/profile-widgets.yml
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub analytics and trophies
        run: python scripts/generate_profile_widgets.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Commit generated widgets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-widgets/github-analytics.svg profile-widgets/github-trophies.svg
          git diff --cached --quiet || git commit -m "Generate profile analytics widgets"
          git push origin HEAD:${{ github.ref_name }}
